<html>
  <head>
    <title>Primeira experiência de RA usando AR.js, com marcador hiro de imagem </title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body styles="margin: 0px; overflow: hidden"> 
  <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
    <a-marker type="pattern" url="pattern-rino.patt">
    <a-video src="rino.mp4" position="0 0.5 0" rotaion="-90 0 0" width="1.3" height="1"></a-video>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  </body>
  
</html>
