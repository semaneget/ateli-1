<html>
  <head>
    <title>Primeira experiência de RA usando Hiro como marcador</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body styles="margin: 0px; overflow: hidden"> 
     <button onclick="document.querySelector('video').play()"
  style="position:fixed; z-index:999; top:10px; left:10px; padding:10px">
  ▶ Iniciar
</button>
  <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">

      <a-assets>
        <video id="video1" src="animacao.mp4" loop crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-marker type="pattern" url="pattern-meu-marcador.patt">
        <a-video
          src="#RINOMP4.MP4"
          width="4"
          height="2.5"
          position="0 0.5 0"
          rotation="-90 0 0">
        </a-video>
      </a-marker>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  </body>
  
</html>
