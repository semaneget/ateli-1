<html>
  <head>
    <title>Primeira experiência de RA usando AR.js com marcador</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden">

    <div id="tela-inicio" style="
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 22px;
      text-align: center;
      padding: 20px;
    ">
      <p>Aponte a câmera para o marcador</p>
      <button onclick="iniciar()" style="
        margin-top: 20px;
        padding: 15px 30px;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        background: #00cc66;
        color: white;
        cursor: pointer;
      ">▶ Iniciar</button>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">

      <a-assets>
        <video
          id="rino"
          src="rino.mp4"
          preload="auto"
          response-type="arraybuffer"
          loop
          muted
          crossorigin="anonymous"
          playsinline
          webkit-playsinline>
        </video>
      </a-assets>

      <a-marker
        preset="custom"
        type="pattern"
        url="pattern-rino.patt"
        registerevents>
        <a-video
          src="#rino"
          position="0 0.5 0"
          rotation="-90 0 180"
          width="3.2"
          height="1.8">
        </a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Detecta iPhone/iPad
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const video = document.getElementById("rino");
      const telaInicio = document.getElementById("tela-inicio");

      // Componente que controla play/pause pelo marcador
      AFRAME.registerComponent("registerevents", {
        init: function () {
          const marker = this.el;

          video.pause();

          marker.addEventListener("markerFound", function () {
            video.muted = false;
            video.play();
          });

          marker.addEventListener("markerLost", function () {
            video.pause();
            video.muted = true;
          });
        }
      });

      function iniciar() {
        telaInicio.style.display = "none";

        if (isIOS) {
          video.muted = false;
          video.play().then(() => {
            video.pause();
            video.currentTime = 0;
          }).catch(() => {
            video.muted = true;
            video.play().then(() => {
              video.pause();
              video.currentTime = 0;
            });
          });
        } else {
          video.muted = true;
          video.play().then(() => {
            video.pause();
            video.currentTime = 0;
          }).catch(err => {
            console.log("Erro ao desbloquear vídeo:", err);
          });
        }
      }
    </script>

  </body>
</html>
