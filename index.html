<html>
  <head>
    <title>Primeira experiência de RA usando AR.js com marcador</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden">

    <div id="tela-inicio" style="
      position: fixed;
      z-index: 9999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 22px;
      text-align: center;
      padding: 20px;
    ">
      <p>Aponte a câmera para o marcador</p>
      <button onclick="iniciar()" style="
        margin-top: 20px;
        padding: 15px 30px;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        background: #00cc66;
        color: white;
        cursor: pointer;
      ">▶ Iniciar</button>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">

      <a-assets>
        <video
          id="video1"
          src="rino.mp4"
          loop
          muted
          crossorigin="anonymous"
          playsinline
          webkit-playsinline
          preload="auto">
        </video>
      </a-assets>

      <a-marker type="pattern" url="pattern-rino.patt">
        <a-video
          src="#video1"
          position="0 0.5 0"
          rotation="-90 0 0"
          width="1.3"
          height="1">
        </a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const video = document.getElementById("video1");
      const telaInicio = document.getElementById("tela-inicio");

      // Detecta se é iPhone/iPad
      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

      function iniciar() {
        telaInicio.style.display = "none";

        if (isIOS) {
          // No iPhone, o áudio só é desbloqueado com interação direta do usuário
          // Então tocamos o vídeo COM áudio direto no clique do botão
          video.muted = false;
          video.play().then(() => {
            video.pause();
            video.currentTime = 0;
            configurarMarcador();
          }).catch(() => {
            // Se falhar, tenta com mudo mesmo
            video.muted = true;
            video.play().then(() => {
              video.pause();
              video.currentTime = 0;
              configurarMarcador();
            });
          });
        } else {
          // Android e outros: desbloqueia mudo, ativa áudio no marcador
          video.muted = true;
          video.play().then(() => {
            video.pause();
            video.currentTime = 0;
            configurarMarcador();
          }).catch(err => {
            console.log("Erro:", err);
            configurarMarcador();
          });
        }
      }

      function configurarMarcador() {
        const marker = document.querySelector("a-marker");

        marker.addEventListener("markerFound", function () {
          video.muted = false;
          video.play();
        });

        marker.addEventListener("markerLost", function () {
          video.pause();
          video.muted = true;
        });
      }
    </script>

  </body>
</html>
